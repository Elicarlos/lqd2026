<div id="observacao-modal" class="fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-lg shadow-xl max-w-md w-full max-h-[90vh] overflow-hidden flex flex-col">
        <!-- Modal Header -->
        <div class="flex justify-between items-center p-4 border-b border-gray-200">
            <h2 class="text-xl font-semibold text-gray-800">Editar Pendência/Observação</h2>
            <button type="button" class="text-gray-400 hover:text-gray-600" data-modal-close="observacao-modal">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>

        <!-- Modal Content -->
        <div class="p-4 flex-grow overflow-auto">
            <input type="hidden" id="observacao-doc-id">
            <label for="observacao-textarea" class="block text-sm font-medium text-gray-700 mb-2">Observação:</label>
            <textarea id="observacao-textarea" class="form-textarea mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50" rows="5"></textarea>
        </div>

        <!-- Modal Footer -->
        <div class="flex justify-end p-4 border-t border-gray-200 space-x-2">
            <button type="button" class="btn-secondary py-2 px-4" data-modal-close="observacao-modal">
                Cancelar
            </button>
            <button type="button" class="btn-primary py-2 px-4" id="save-observacao-btn">
                Salvar
            </button>
        </div>
    </div>
</div>
