{% load static %}
<div class="modal-header">
    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
        <span aria-hidden="true">&times;</span>
                    </button>
    <h4 class="modal-title" id="myModalLabel">Login</h4>
                </div>
<div class="modal-body">
    <form method="post" action="{% url 'participante:login' %}" id="loginForm">
                    {% csrf_token %}
        <input type="hidden" name="form_type" value="form_login">
        
        <div class="form-group">
            <label for="username">CPF</label>
            <div class="input-group">
                <span class="input-group-addon">
                    <i class="glyphicon glyphicon-user"></i>
                </span>
                <input type="text" 
                       id="username" 
                       name="username" 
                       class="form-control cpf-mask" 
                       placeholder="000.000.000-00" 
                       required>
                        </div>
                    </div>

        <div class="form-group">
            <label for="password">Senha</label>
            <div class="input-group">
                <span class="input-group-addon">
                    <i class="glyphicon glyphicon-lock"></i>
                </span>
                <input type="password" 
                       id="password" 
                       name="password" 
                       class="form-control" 
                       placeholder="Digite sua senha" 
                       required>
                        </div>
                    </div>

        <div class="form-group">
            <button type="submit" class="btn btn-primary btn-block">
                Entrar
                        </button>
                    </div>

        <div class="text-center">
            <a href="{% url 'participante:password_reset' %}" class="text-muted">
                            Esqueceu a senha?
                        </a>
                    </div>
                </form>
</div>

<script>
$(document).ready(function() {
    $('.cpf-mask').mask('000.000.000-00');

    $('#loginForm').on('submit', function(event) {
        event.preventDefault();
        $.ajax({
            url: "{% url 'participante:homepage' %}",
            type: "POST",
            data: $(this).serialize(),
            success: function(response) {
                if (response.login_error) {
                    $('#password-errors').html(response.errors.password);
                    $('#myModal').modal('show');
                } else {
                    window.location.href = response.redirect_url;
                }
            },
            error: function(xhr, errmsg, err) {
                console.log(xhr.status + ": " + xhr.responseText);
            }
        });
    });
    });
</script>
