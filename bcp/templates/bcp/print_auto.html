{% extends "mobile.html" %}

{% block title %}Imprimindo Cupons{% endblock %}

{% block content %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>Imprimindo Cupons</title>
    <style>
        /* Estilos para a tela de carregamento */
        .loading-container {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }

        .loading-spinner {
            width: 64px;
            height: 64px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Esconde o iframe */
        #printFrame {
            position: absolute;
            width: 0;
            height: 0;
            border: 0;
            visibility: hidden;
        }

        /* Estilo para o texto de status */
        .status-text {
            margin-top: 20px;
            text-align: center;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .status-text h2 {
            color: #2d3748;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .status-text p {
            color: #4a5568;
            font-size: 1rem;
        }
    </style>

    <script type="text/javascript">
        let isPrintTriggered = false;
        let printAttempted = false;

        function downloadAndPrintPDF(url) {
            if (printAttempted) return;
            printAttempted = true;

            // Fazer download do PDF como blob
            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Erro ao baixar PDF');
                    }
                    return response.blob();
                })
                .then(blob => {
                    // Criar URL do blob
                    const blobUrl = URL.createObjectURL(blob);
                    
                    // Criar um iframe temporário para impressão
                    const printFrame = document.createElement('iframe');
                    printFrame.style.display = 'none';
                    printFrame.src = blobUrl;
                    
                    document.body.appendChild(printFrame);
                    
                    // Aguardar o carregamento e abrir em pop-up centralizado
                    printFrame.onload = function() {
                        setTimeout(() => {
                            try {
                                // Calcular posição central da tela
                                const width = 900;
                                const height = 700;
                                const left = Math.round((screen.availWidth - width) / 2);
                                const top = Math.round((screen.availHeight - height) / 2);
                                
                                console.log('Abrindo pop-up:', {width, height, left, top});
                                
                                // Abrir o PDF em pop-up centralizado
                                const newWindow = window.open(blobUrl, '_blank', 
                                    `width=${width},height=${height},left=${left},top=${top},scrollbars=yes,resizable=yes,toolbar=no,menubar=no,location=no,status=no,centerscreen=yes`);
                                
                                if (newWindow) {
                                    newWindow.focus();
                                    
                                    // Aguardar o PDF carregar completamente
                                    setTimeout(() => {
                                        try {
                                            console.log('Abrindo diálogo de impressão...');
                                            newWindow.print();
                                            console.log('Diálogo de impressão aberto. Aguardando usuário...');
                                        } catch (printError) {
                                            console.log('Impressão automática não permitida:', printError);
                                            console.log('Janela mantida aberta para impressão manual');
                                        }
                                    }, 2000);
                                } else {
                                    console.error('Não foi possível abrir a janela pop-up');
                                    alert('Pop-up bloqueado pelo navegador. Permita pop-ups e tente novamente.');
                                }
                                
                                // Limpar recursos
                                setTimeout(() => {
                                    document.body.removeChild(printFrame);
                                    URL.revokeObjectURL(blobUrl);
                                }, 3000);
                            } catch (error) {
                                console.error('Erro ao abrir impressão:', error);
                                window.close();
                            }
                        }, 1000);
                    };
                })
                .catch(error => {
                    console.error('Erro ao processar PDF:', error);
                    alert('Erro ao carregar PDF. Tente novamente.');
                });
        }

        function checkTaskStatus(taskId) {
            fetch(`/barcode/check_task_status/${taskId}/`)
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'SUCCESS') {
                        // PDF está pronto, baixar e imprimir
                        downloadAndPrintPDF(data.pdf_url);
                    } else if (data.status === 'FAILURE') {
                        document.querySelector('.status-text h2').textContent = 'Erro ao gerar PDF';
                        document.querySelector('.status-text p').textContent = 'Tente novamente.';
                    } else {
                        // Continuar verificando
                        setTimeout(() => checkTaskStatus(taskId), 1000);
                    }
                })
                .catch(error => {
                    console.error('Erro:', error);
                    document.querySelector('.status-text h2').textContent = 'Erro ao verificar status';
                    document.querySelector('.status-text p').textContent = 'Tente novamente.';
                });
        }

        // Iniciar quando a página carregar
        document.addEventListener('DOMContentLoaded', () => {
            const taskId = '{{ task_id }}';
            if (taskId) {
                checkTaskStatus(taskId);
            } else {
                // Se não tem task_id, carregar PDF direto
                downloadAndPrintPDF('{{ pdf_url }}');
            }
        });
    </script>
</head>
<body>
    <!-- Container de loading -->
    <div class="loading-container">
        <div class="loading-spinner"></div>
        <div class="status-text">
            <h2>Preparando impressão...</h2>
            <p>Aguarde um momento...</p>
        </div>
    </div>

</body>
</html>
{% endblock %}
